<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link rel="stylesheet" href="./css/style.css">

    <title>FlowChat</title>
</head>
<body>
    
    <main class="container">
        <aside class="sidebar">
            <button class="menu-close" id="menuClose" aria-label="Fechar menu">
                ✖
            </button>

            <h3>FlowChat</h3>

            <!-- USUÁRIO LOGADO -->
            <div class="sidebar__profile">
                <img id="userPhoto" src="" alt="Foto de perfil do usuário">
                <div>
                    <span id="userName">Usuário</span>
                    <span 
                        id="userStatus" 
                        class="status online"
                        aria-label="Usuário online">
                    </span>
                </div>
            </div>

            <!-- LISTA DE AMIGOS -->
            <ul class="friends-list" id="friendsList">
                <!-- Amigos vão aparecer aqui dinamicamente -->
            </ul>

            <ul class="sidebar__menu">
                <button id="btnLogout" class="sidebar__logout">
                    <span class="material-symbols-outlined" aria-hidden="true">
                        logout
                    </span>
                    Sair
                </button>
            </ul>

        </aside>


        <section class="login">
            <img src="./img/flowchat2.png" width="80">
            <div class="login__box">
                <h2>Bem vindos ao FlowChat!</h2>
                
                <button id="btnGoogle" class="login__button">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                    Entrar com Google
                </button>

                <p 
                    id="login-status"
                    class="login__status"
                    role="status"
                    aria-live="polite">
                </p>
            </div>
        </section>

        <div class="overlay" id="overlay"></div>

        <section class="chat">
            <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
                ☰
            </button>

            <section class="chat__messages" aria-live="polite" aria-label="Mensagens do chat">
            </section>

            <form class="chat__form">
                <label for="input-messages" class="visually-hidden">Campo de mensagem</label>
                <input type="text" id="input-messages" class="chat__input" placeholder="Digite uma mensagem" required />
                <button 
                    type="submit"
                    id="send-button"
                    class="chat__button"
                    aria-label="Enviar mensagem">
                    
                    <span class="material-symbols-outlined" aria-hidden="true">
                        send
                    </span>
                </button>
            </form>
        </section>

    </section>

    <script type="module" src="./js/auth.js"></script>
    <script type="module" src="./js/messages.js"></script>
    <script type="module" src="./js/util.js"></script>
</body>
</html>
